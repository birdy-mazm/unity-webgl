<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">

    <title>Unity Web Player | MazM_Studio</title>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #unity-container {
        position: relative;
        width: min(100vw, calc(100vh * 16 / 9));
        height: min(100vh, calc(100vw * 9 / 16));
        background: #231F20;
      }

      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: #231F20;
      }
    </style>
  </head>

  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width="1280" height="720" tabindex="-1"></canvas>
    </div>

    <script src="Build/MazM_Studio_WebGL.loader.js"></script>

    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/MazM_Studio_WebGL.data",
        frameworkUrl: "Build/MazM_Studio_WebGL.framework.js",
        codeUrl: "Build/MazM_Studio_WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "MazM",
        productName: "MazM_Studio",
        productVersion: "1.3",

        // 필요하면 고정 렌더 해상도용으로 테스트 가능
        // matchWebGLToCanvasSize: false,
        // devicePixelRatio: 1,
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
